# Application Configuration for Your Company Automation Tests
# This configuration file shows how to configure the framework for your project

# Application Environment Settings
app:
  environment: qa  # Options: local, qa, staging, production
  baseUrl: "https://your-app.com"  # Replace with your application URL
  implicitWaitTime: 10
  explicitWaitTime: 15
  pageLoadTimeout: 30

# Browser Configuration
browser:
  name: chrome  # Options: chrome, firefox, edge, safari
  headless: false  # Set to true for CI/CD pipelines
  incognito: false
  downloadPath: "./downloads"

  # Chrome specific options
  chrome:
    startMaximized: true
    disableNotifications: true
    disablePopups: true
    downloadPrompt: false

  # Firefox specific options
  firefox:
    privateMode: false

  # Edge specific options
  edge:
    startMaximized: true

# Screenshot and Report Settings
screenshots:
  enabled: true
  path: "./screenshots"
  onFailure: true
  onSuccess: false

# Logging Configuration
logging:
  level: INFO  # Options: DEBUG, INFO, WARN, ERROR

# Test Execution Settings
execution:
  retryFailedTests: true
  retryCount: 1
  parallel: false
  threadCount: 1

# Allure Report Settings
allure:
  enabled: true
  resultsPath: "./allure-results"
  reportPath: "./allure-report"

# Data File Paths
dataFiles:
  excelPath: "./src/test/resources/testdata/excel/"
  yamlPath: "./src/test/resources/testdata/yaml/"
  jsonPath: "./src/test/resources/testdata/json/"

# Test User Credentials (Use environment variables for sensitive data)
testUsers:
  admin:
    username: "admin@yourcompany.com"
    password: "${ADMIN_PASSWORD}"  # Use environment variables
  regular:
    username: "user@yourcompany.com"
    password: "${USER_PASSWORD}"

# API Configuration (if using REST Assured)
api:
  baseUrl: "https://api.your-app.com"
  timeout: 30000
  auth:
    type: "bearer"  # Options: bearer, basic, api-key
    token: "${API_TOKEN}"

# Database Configuration (if needed for data validation)
database:
  enabled: false
  host: "localhost"
  port: 5432
  name: "test_db"
  username: "${DB_USERNAME}"
  password: "${DB_PASSWORD}"

# Notification Settings (Optional)
notifications:
  enabled: false
  email:
    enabled: false
    smtpHost: "smtp.gmail.com"
    smtpPort: 587
    username: "${EMAIL_USERNAME}"
    password: "${EMAIL_PASSWORD}"
    recipients: ["qa-team@yourcompany.com"]
  slack:
    enabled: false
    webhookUrl: "${SLACK_WEBHOOK_URL}"
    channel: "#qa-notifications"
